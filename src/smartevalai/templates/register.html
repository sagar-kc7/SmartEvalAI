{% extends "base.html" %}
{% block title %}Register — SmartEval AI{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-md">
        <h1 class="text-2xl font-bold text-gray-800 mb-1">Create account</h1>
        <p class="text-gray-500 text-sm mb-6">Join SmartEval AI as a teacher or student</p>

        <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-4"></div>
        <div id="success-msg" class="hidden bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg px-4 py-3 mb-4"></div>

        <form id="register-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" id="full_name" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
                    placeholder="Sagar KC" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
                    placeholder="you@example.com" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
                    placeholder="••••••••" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
                <select id="role" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>
            <button type="submit"
                class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-2 rounded-lg transition text-sm">
                Create Account
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Already have an account?
            <a href="/login" class="text-primary hover:underline font-medium">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById("register-form").addEventListener("submit", async function(e) {
    e.preventDefault();
    const errorDiv = document.getElementById("error-msg");
    const successDiv = document.getElementById("success-msg");
    errorDiv.classList.add("hidden");
    successDiv.classList.add("hidden");

    const body = {
        full_name: document.getElementById("full_name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        role: document.getElementById("role").value,
    };

    try {
        const res = await fetch("/api/v1/auth/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(body),
        });
        const data = await res.json();

        if (!res.ok) {
            errorDiv.textContent = data.detail || "Registration failed.";
            errorDiv.classList.remove("hidden");
            return;
        }

        successDiv.textContent = "Account created! Redirecting to login...";
        successDiv.classList.remove("hidden");
        setTimeout(() => window.location.href = "/login", 1500);
    } catch(err) {
        errorDiv.textContent = "Network error. Please try again.";
        errorDiv.classList.remove("hidden");
    }
});
</script>
{% endblock %}
